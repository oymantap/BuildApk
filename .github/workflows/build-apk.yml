name: Build Android APK Otomatis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Supaya bisa klik tombol "Run" manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Buat Proyek Android Dummy
        run: |
          # Perintah ini akan membuat struktur folder Android otomatis di server
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/rycl/app
          
          # Buat file settings
          echo "rootProject.name = 'AppRycl'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          # Buat file build.gradle utama
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          
          # Buat file build.gradle khusus app
          cat <<EOT > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rycl.app'
              compileSdk 33
              defaultConfig {
                  applicationId "com.rycl.app"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOT

          # Buat Manifest biar gak error
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="App Rycl"></application>
          </manifest>
          EOT

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: APK-Jadi-Rycl
          path: app/build/outputs/apk/debug/*.apk
          
