name: Build Android APK Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Buat Struktur Proyek
        run: |
          # Buat folder-folder yang dibutuhkan
          mkdir -p app/src/main/java/com/rycl/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Buat settings.gradle
          echo "rootProject.name = 'AppRycl'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # Buat build.gradle Utama
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOT

          # Buat build.gradle App
          cat <<EOT > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rycl.app'
              compileSdk 33
              defaultConfig {
                  applicationId "com.rycl.app"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOT

          # Buat Android Manifest (Sangat Minimalis)
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rycl.app"><application/></manifest>' > app/src/main/AndroidManifest.xml

      - name: Build dengan Gradle
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: Hasil-APK-Rycl
          path: app/build/outputs/apk/debug/*.apk
          
