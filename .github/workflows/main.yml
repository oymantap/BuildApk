name: Build_FINAL_TOTAL_RYCL_NO_ERROR

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable

          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
          fi

          echo "include ':app'" > settings.gradle

          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.rycl.jam.fix.final.berhasil"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              // KOSONG TOTAL - ANTI MUTATION ERROR
          }
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="Jam Simpel" 
                  android:icon="@drawable/icon_app" 
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.media.Ringtone;
          import android.media.RingtoneManager;

          public class MainActivity extends Activity {
              private Ringtone ring;
              private CountDownTimer cdt;
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(1);
                  root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#121212"));

                  TextView head = new TextView(this);
                  head.setText("JAM SIMPEL"); head.setTextColor(Color.WHITE);
                  head.setTextSize(24); head.setPadding(0, 40, 0, 40);
                  root.addView(head);

                  final TextClock clock = new TextClock(this);
                  clock.setTextSize(60); clock.setTextColor(Color.CYAN);
                  root.addView(clock);

                  final LinearLayout tL = new LinearLayout(this);
                  tL.setOrientation(1); tL.setGravity(Gravity.CENTER);
                  tL.setPadding(0, 50, 0, 50);

                  final TextView tvDisp = new TextView(this);
                  tvDisp.setText("00:00:00"); tvDisp.setTextSize(50); tvDisp.setTextColor(Color.YELLOW);
                  tL.addView(tvDisp);

                  LinearLayout ins = new LinearLayout(this);
                  ins.setGravity(Gravity.CENTER);
                  final EditText eH = new EditText(this); eH.setHint("H"); eH.setTextColor(Color.WHITE);
                  final EditText eM = new EditText(this); eM.setHint("M"); eM.setTextColor(Color.WHITE);
                  final EditText eS = new EditText(this); eS.setHint("S"); eS.setTextColor(Color.WHITE);
                  eH.setInputType(2); eM.setInputType(2); eS.setInputType(2);
                  ins.addView(eH); ins.addView(eM); ins.addView(eS);
                  tL.addView(ins);

                  final Button btn = new Button(this);
                  btn.setText("START TIMER");
                  tL.addView(btn);

                  final Button stopBtn = new Button(this);
                  stopBtn.setText("MATIKAN ALARM"); stopBtn.setVisibility(8);
                  stopBtn.setBackgroundColor(Color.RED);
                  tL.addView(stopBtn);
                  root.addView(tL);

                  TextView wm = new TextView(this);
                  wm.setText("Powered by Rycl"); wm.setTextSize(10);
                  wm.setTextColor(Color.DKGRAY); wm.setGravity(1);
                  wm.setPadding(0, 50, 0, 20);
                  root.addView(wm);

                  btn.setOnClickListener(v -> {
                      long time = (gv(eH)*3600 + gv(eM)*60 + gv(eS)) * 1000;
                      if(time > 0) {
                          if(cdt != null) cdt.cancel();
                          cdt = new CountDownTimer(time, 1000) {
                              public void onTick(long l) {
                                  long h=l/3600000, m=(l%3600000)/60000, s=(l%60000)/1000;
                                  tvDisp.setText(String.format("%02d:%02d:%02d", h, m, s));
                              }
                              public void onFinish() {
                                  tvDisp.setText("TIME UP!");
                                  ring = RingtoneManager.getRingtone(getApplicationContext(), RingtoneManager.getDefaultUri(4));
                                  if(ring != null) { ring.setLooping(true); ring.play(); }
                                  btn.setVisibility(8); stopBtn.setVisibility(0);
                              }
                          }.start();
                      }
                  });

                  stopBtn.setOnClickListener(v -> {
                      if(ring != null) ring.stop();
                      stopBtn.setVisibility(8); btn.setVisibility(0);
                      tvDisp.setText("00:00:00");
                  });

                  setContentView(root);
              }
              private long gv(EditText e) {
                  String s = e.getText().toString();
                  return s.isEmpty() ? 0 : Long.parseLong(s);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_Berhasil
          path: app/build/outputs/apk/debug/*.apk
          
