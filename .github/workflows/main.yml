name: Build_APK_Rycl

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android Proyek
        run: |
          # Buat struktur dasar dalam satu kali sikat
          mkdir -p app/src/main
          echo 'rootProject.name = "RyclApp"' > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          # Build file utama
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          EOT

          cat <<EOT > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rycl.app'
              compileSdk 33
              defaultConfig { applicationId "com.rycl.app"; minSdk 21; targetSdk 33; versionCode 1; versionName "1.0" }
          }
          EOT

          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"><application/></manifest>' > app/src/main/AndroidManifest.xml

          # Perintah rakit APK
          chmod +x gradlew || true
          gradle assembleDebug

      - name: Ambil Hasilnya
        uses: actions/upload-artifact@v4
        with:
          name: APK_RYCL_SUKSES
          path: app/build/outputs/apk/debug/*.apk

