name: Build_Jam_Simpel_Final_Banget

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Minimalist Project
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/rycl/jam
          
          # 1. Settings (Hanya daftar modul, tanpa gudang biar gak bentrok)
          echo "include ':app'" > settings.gradle

          # 2. Build File Utama (Tempat satu-satunya gudang Google)
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOT

          # 3. Build File App (Langsung ke intinya)
          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 34
              namespace 'com.rycl.jam'
              defaultConfig {
                  applicationId "com.rycl.jam"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1214
                  versionName "12.14"
              }
          }
          EOT

          # 4. Manifest (Ikon sistem biar aman)
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Jam Simpel" android:icon="@android:drawable/ic_lock_idle_alarm">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHer" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 5. Kode Java (Jam + Timer)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.media.RingtoneManager;

          public class MainActivity extends Activity {
              private CountDownTimer timer;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.BLACK);

                  TextView name = new TextView(this);
                  name.setText("JAM RYCL");
                  name.setTextColor(Color.WHITE);
                  root.addView(name);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50);
                  clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  EditText input = new EditText(this);
                  input.setHint("Menit");
                  input.setTextColor(Color.WHITE);
                  input.setInputType(android.text.InputType.TYPE_CLASS_NUMBER);
                  root.addView(input);

                  Button btn = new Button(this);
                  btn.setText("START");
                  root.addView(btn);

                  btn.setOnClickListener(v -> {
                      if(!input.getText().toString().isEmpty()) {
                          new CountDownTimer(Long.parseLong(input.getText().toString()) * 60000, 1000) {
                              public void onTick(long ms) {}
                              public void onFinish() {
                                  RingtoneManager.getRingtone(getApplicationContext(), RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM)).play();
                              }
                          }.start();
                      }
                  });
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Final
          path: app/build/outputs/apk/debug/*.apk
          
