name: Build_Jam_Simpel_Rycl_Ultra_Fix

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable

          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
          fi

          echo "include ':app'" > settings.gradle

          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.rycl.jam.v3.final"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1219
                  versionName "12.19"
              }
          }
          dependencies {}
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application 
                  android:label="Jam Simpel" 
                  android:icon="@drawable/icon_app" 
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:name="com.rycl.jam.AlarmReceiver" android:exported="false" />
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/AlarmReceiver.java
          package com.rycl.jam;
          import android.content.*;
          import android.media.*;
          import android.widget.Toast;

          public class AlarmReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  Toast.makeText(context, "WAKTU HABIS! ALARM RYCL BUNYI!", Toast.LENGTH_LONG).show();
                  Uri notification = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  Ringtone r = RingtoneManager.getRingtone(context, notification);
                  if (r != null) {
                      r.setStreamType(AudioManager.STREAM_ALARM);
                      r.play();
                  }
              }
          }
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.*;
          import android.content.*;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import java.util.Calendar;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(1); root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#121212"));

                  // --- FITUR 1: JAM ---
                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50); clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  // --- FITUR 2: TIMER (DURASI) ---
                  TextView t2 = new TextView(this);
                  t2.setText("\nTIMER (MENIT)"); t2.setTextColor(Color.CYAN);
                  root.addView(t2);

                  final EditText inTimer = new EditText(this);
                  inTimer.setHint("Berapa Menit?"); inTimer.setTextColor(Color.WHITE); inTimer.setInputType(2);
                  root.addView(inTimer);

                  Button btnTimer = new Button(this);
                  btnTimer.setText("START TIMER");
                  root.addView(btnTimer);

                  // --- FITUR 3: ALARM (JAM TERTENTU) ---
                  TextView t3 = new TextView(this);
                  t3.setText("\nALARM (JAM & MENIT)"); t3.setTextColor(Color.YELLOW);
                  root.addView(t3);

                  LinearLayout row = new LinearLayout(this);
                  row.setGravity(Gravity.CENTER);
                  final EditText inH = new EditText(this); inH.setHint("Jam (0-23)"); inH.setTextColor(Color.WHITE); inH.setInputType(2);
                  final EditText inM = new EditText(this); inM.setHint("Menit"); inM.setTextColor(Color.WHITE); inM.setInputType(2);
                  row.addView(inH); row.addView(inM);
                  root.addView(row);

                  Button btnAlarm = new Button(this);
                  btnAlarm.setText("SET ALARM");
                  root.addView(btnAlarm);

                  TextView wm = new TextView(this);
                  wm.setText("\n\nPowered by Rycl"); wm.setTextSize(10);
                  wm.setTextColor(Color.DKGRAY); wm.setGravity(1);
                  root.addView(wm);

                  // LOGIC TIMER
                  btnTimer.setOnClickListener(v -> {
                      setAlarmSystem(Long.parseLong(inTimer.getText().toString()) * 60000);
                      Toast.makeText(this, "Timer dipasang!", 0).show();
                  });

                  // LOGIC ALARM
                  btnAlarm.setOnClickListener(v -> {
                      Calendar cal = Calendar.getInstance();
                      cal.set(Calendar.HOUR_OF_DAY, Integer.parseInt(inH.getText().toString()));
                      cal.set(Calendar.MINUTE, Integer.parseInt(inM.getText().toString()));
                      cal.set(Calendar.SECOND, 0);
                      
                      long diff = cal.getTimeInMillis() - System.currentTimeMillis();
                      if(diff < 0) diff += 24 * 3600000; // Jika lewat, set buat besok
                      
                      setAlarmSystem(diff);
                      Toast.makeText(this, "Alarm disetel!", 0).show();
                  });

                  setContentView(root);
              }

              private void setAlarmSystem(long delayMs) {
                  AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                  Intent i = new Intent(this, AlarmReceiver.class);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 0, i, PendingIntent.FLAG_IMMUTABLE);
                  long trigger = System.currentTimeMillis() + delayMs;
                  
                  if (Build.VERSION.SDK_INT >= 31) {
                      am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, trigger, pi);
                  } else {
                      am.setExact(AlarmManager.RTC_WAKEUP, trigger, pi);
                  }
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_Lengkap
          path: app/build/outputs/apk/debug/*.apk
          
