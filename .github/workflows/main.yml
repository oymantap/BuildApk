name: Build_Jam_Simpel_Rycl_Final_V4

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          # 1. Bersihkan folder
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/layout
          
          # 2. Settings
          cat <<EOT > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOT

          # 3. Build File Utama (Wajib ada plugin management)
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOT

          # 4. Build File App (Pakai cara lama yang lebih stabil buat Gradle 9)
          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'

          android {
              compileSdkVersion 34
              namespace 'com.rycl.jam'
              
              defaultConfig {
                  applicationId "com.rycl.jam"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1214
                  versionName "12.14"
              }
          }
          EOT

          # 5. Manifest (Ikon sistem dulu biar gak error resource)
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="Jam Simpel" 
                  android:icon="@android:drawable/ic_lock_idle_alarm"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 6. Kode Java (UI Modern + Timer)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.media.Ringtone;
          import android.media.RingtoneManager;
          import android.net.Uri;

          public class MainActivity extends Activity {
              private CountDownTimer timer;
              private TextView timerDisplay;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(60, 60, 60, 60);
                  GradientDrawable gd = new GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, new int[] {0xFF1A237E, 0xFF000000});
                  root.setBackground(gd);

                  TextView name = new TextView(this);
                  name.setText("RYCL JAM SIMPEL");
                  name.setTextColor(Color.WHITE);
                  name.setPadding(0, 0, 0, 100);
                  root.addView(name);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(60);
                  clock.setTextColor(Color.WHITE);
                  clock.setFormat24Hour("HH:mm:ss");
                  root.addView(clock);

                  EditText input = new EditText(this);
                  input.setHint("Menit");
                  input.setHintTextColor(Color.LTGRAY);
                  input.setTextColor(Color.WHITE);
                  input.setInputType(android.text.InputType.TYPE_CLASS_NUMBER);
                  input.setGravity(Gravity.CENTER);
                  root.addView(input);

                  timerDisplay = new TextView(this);
                  timerDisplay.setText("00:00");
                  timerDisplay.setTextSize(40);
                  timerDisplay.setTextColor(Color.YELLOW);
                  root.addView(timerDisplay);

                  Button startBtn = new Button(this);
                  startBtn.setText("MULAI TIMER");
                  startBtn.setBackgroundColor(Color.parseColor("#FFD700"));
                  root.addView(startBtn);

                  startBtn.setOnClickListener(v -> {
                      String val = input.getText().toString();
                      if(!val.isEmpty()) {
                          if(timer != null) timer.cancel();
                          timer = new CountDownTimer(Long.parseLong(val) * 60000, 1000) {
                              public void onTick(long ms) {
                                  long sec = ms / 1000;
                                  timerDisplay.setText(String.format("%02d:%02d", sec/60, sec%60));
                              }
                              public void onFinish() {
                                  timerDisplay.setText("HABIS!");
                                  try {
                                      Uri notification = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                                      Ringtone r = RingtoneManager.getRingtone(getApplicationContext(), notification);
                                      r.play();
                                  } catch (Exception e) {}
                              }
                          }.start();
                      }
                  });
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Fixed_Build
          path: app/build/outputs/apk/debug/*.apk
          
