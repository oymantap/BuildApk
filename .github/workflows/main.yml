name: Build_Jam_Rycl_PURE_ANDROID_NO_LIBS

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable

          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
          fi

          echo "include ':app'" > settings.gradle
          
          # Buildscript murni tanpa aneh-aneh
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          # App build TANPA DEPENDENCIES SAMA SEKALI
          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig { 
                  applicationId "com.rycl.jam.pure"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1211
                  versionName "12.11"
              }
          }
          dependencies {}
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <application 
                  android:label="Jam Simpel" 
                  android:icon="@drawable/icon_app" 
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:name="com.rycl.jam.AlarmReceiver" android:exported="false" />
              </application>
          </manifest>
          EOT

          # Receiver murni pakai framework Android (Tanpa Notifikasi AndroidX)
          cat <<EOT > app/src/main/java/com/rycl/jam/AlarmReceiver.java
          package com.rycl.jam;
          import android.content.*;
          import android.media.*;
          import android.net.Uri;
          import android.widget.Toast;

          public class AlarmReceiver extends BroadcastReceiver {
              public static Ringtone r;
              @Override
              public void onReceive(Context context, Intent intent) {
                  Toast.makeText(context, "ALARM RYCL BUNYI! BUKA APLIKASI BUAT MATIKAN!", Toast.LENGTH_LONG).show();
                  Uri uri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  if (r == null) r = RingtoneManager.getRingtone(context, uri);
                  r.play();
              }
          }
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.*;
          import android.content.*;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import java.util.Calendar;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  // Matikan ringtone kalau aplikasi dibuka
                  if(AlarmReceiver.r != null && AlarmReceiver.r.isPlaying()) AlarmReceiver.r.stop();

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(1); root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#121212"));

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50); clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  final EditText inT = new EditText(this); inT.setHint("Timer (Menit)"); inT.setHintTextColor(Color.GRAY); inT.setTextColor(Color.WHITE); inT.setInputType(2);
                  root.addView(inT);
                  Button bT = new Button(this); bT.setText("START TIMER"); root.addView(bT);

                  final EditText inH = new EditText(this); inH.setHint("Jam"); inH.setHintTextColor(Color.GRAY); inH.setTextColor(Color.WHITE); inH.setInputType(2);
                  final EditText inM = new EditText(this); inM.setHint("Menit"); inM.setHintTextColor(Color.GRAY); inM.setTextColor(Color.WHITE); inM.setInputType(2);
                  root.addView(inH); root.addView(inM);
                  Button bA = new Button(this); bA.setText("SET ALARM"); root.addView(bA);

                  Button bS = new Button(this); bS.setText("MATIKAN ALARM"); bS.setBackgroundColor(Color.RED);
                  bS.setOnClickListener(v -> { if(AlarmReceiver.r != null) AlarmReceiver.r.stop(); });
                  root.addView(bS);

                  TextView wm = new TextView(this); wm.setText("\nPowered by Rycl"); wm.setTextColor(Color.DKGRAY); wm.setGravity(1); root.addView(wm);

                  bT.setOnClickListener(v -> {
                      if(!inT.getText().toString().isEmpty()) setA(Long.parseLong(inT.getText().toString()) * 60000);
                  });
                  bA.setOnClickListener(v -> {
                      if(!inH.getText().toString().isEmpty() && !inM.getText().toString().isEmpty()){
                          Calendar c = Calendar.getInstance();
                          c.set(Calendar.HOUR_OF_DAY, Integer.parseInt(inH.getText().toString()));
                          c.set(Calendar.MINUTE, Integer.parseInt(inM.getText().toString()));
                          c.set(Calendar.SECOND, 0);
                          long d = c.getTimeInMillis() - System.currentTimeMillis();
                          if(d < 0) d += 24 * 3600000;
                          setA(d);
                      }
                  });
                  setContentView(root);
              }

              private void setA(long ms) {
                  AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                  Intent i = new Intent(this, AlarmReceiver.class);
                  PendingIntent pi = PendingIntent.getBroadcast(this, (int)System.currentTimeMillis(), i, PendingIntent.FLAG_IMMUTABLE);
                  am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + ms, pi);
                  Toast.makeText(this, "Alarm Disetel!", 0).show();
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_PURE_OK
          path: app/build/outputs/apk/debug/*.apk
          
