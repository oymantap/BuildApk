name: Build_Jam_Simpel_Rycl_Modern_UI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable
          [ -f "icon_app.png" ] && cp icon_app.png app/src/main/res/drawable/icon_app.png
          
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig { applicationId "com.rycl.jam.modern"; minSdk 24; targetSdk 34; versionCode 1211; versionName "12.11" }
          }
          dependencies {}
          EOT

          # Buat background tombol melengkung (Border Radius) secara manual
          cat <<EOT > app/src/main/res/drawable/btn_round.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#3344FF"/>
              <corners android:radius="20dp"/>
          </shape>
          EOT

          cat <<EOT > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FF4444"/>
              <corners android:radius="20dp"/>
          </shape>
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <application android:label="Jam Rycl" android:icon="@drawable/icon_app" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true" android:launchMode="singleTop">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  <receiver android:name="com.rycl.jam.AlarmReceiver" android:exported="false" />
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/AlarmReceiver.java
          package com.rycl.jam;
          import android.content.*;
          import android.media.*;
          import android.net.Uri;
          import android.widget.Toast;

          public class AlarmReceiver extends BroadcastReceiver {
              public static Ringtone r;
              @Override
              public void onReceive(Context context, Intent intent) {
                  Toast.makeText(context, "WAKTU HABIS!", Toast.LENGTH_LONG).show();
                  Uri uri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  if (r == null) r = RingtoneManager.getRingtone(context, uri);
                  r.play();
              }
          }
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.*;
          import android.content.*;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;

          public class MainActivity extends Activity {
              private long timeLeft = 0;
              private boolean isRunning = false;
              private CountDownTimer timer;
              private TextView tvTimer;
              private EditText inT;
              private Button btnStartPause;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  if(AlarmReceiver.r != null) AlarmReceiver.r.stop();

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(1); root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#0F172A")); // Dark Blueish Black
                  root.setPadding(50, 50, 50, 50);

                  // Header
                  TextClock clock = new TextClock(this);
                  clock.setTextSize(32); clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  // Space
                  View space = new View(this); root.addView(space, new LinearLayout.LayoutParams(1, 100));

                  // Timer Display
                  tvTimer = new TextView(this);
                  tvTimer.setText("00:00"); tvTimer.setTextSize(80); tvTimer.setTextColor(Color.parseColor("#38BDF8"));
                  root.addView(tvTimer);

                  // Input Box
                  inT = new EditText(this);
                  inT.setHint("Set Menit"); inT.setHintTextColor(Color.GRAY);
                  inT.setTextColor(Color.WHITE); inT.setInputType(2);
                  inT.setGravity(Gravity.CENTER);
                  inT.setBackgroundColor(Color.parseColor("#1E293B"));
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0, 40, 0, 40);
                  root.addView(inT, lp);

                  // Tombol Start/Pause
                  btnStartPause = new Button(this);
                  btnStartPause.setText("START");
                  btnStartPause.setTextColor(Color.WHITE);
                  btnStartPause.setBackgroundResource(app.src.main.res.drawable.btn_round); // Placeholder, will fix in Java
                  styleButton(btnStartPause, "#0EA5E9");
                  root.addView(btnStartPause);

                  // Space kecil
                  View space2 = new View(this); root.addView(space2, new LinearLayout.LayoutParams(1, 30));

                  // Tombol Mulai Baru
                  Button btnReset = new Button(this);
                  btnReset.setText("MULAI BARU");
                  btnReset.setTextColor(Color.WHITE);
                  styleButton(btnReset, "#EF4444");
                  root.addView(btnReset);

                  // Watermark
                  TextView wm = new TextView(this);
                  wm.setText("\nPowered by Rycl"); wm.setTextColor(Color.parseColor("#475569"));
                  wm.setGravity(Gravity.CENTER);
                  root.addView(wm);

                  btnStartPause.setOnClickListener(v -> {
                      if (!isRunning) {
                          long ms = (timeLeft > 0) ? timeLeft : (inT.getText().toString().isEmpty() ? 0 : Long.parseLong(inT.getText().toString()) * 60000);
                          if (ms > 0) {
                              startTimer(ms);
                              btnStartPause.setText("PAUSE");
                              styleButton(btnStartPause, "#F59E0B"); // Orange for pause
                          }
                      } else {
                          timer.cancel();
                          isRunning = false;
                          btnStartPause.setText("RESUME");
                          styleButton(btnStartPause, "#10B981"); // Green for resume
                      }
                  });

                  btnReset.setOnClickListener(v -> {
                      if (timer != null) timer.cancel();
                      if (AlarmReceiver.r != null) AlarmReceiver.r.stop();
                      isRunning = false;
                      timeLeft = 0;
                      tvTimer.setText("00:00");
                      inT.setText("");
                      btnStartPause.setText("START");
                      styleButton(btnStartPause, "#0EA5E9");
                  });

                  setContentView(root);
              }

              private void startTimer(long ms) {
                  isRunning = true;
                  timer = new CountDownTimer(ms, 1000) {
                      public void onTick(long l) {
                          timeLeft = l;
                          tvTimer.setText(String.format("%02d:%02d", (int)(l/60000), (int)(l%60000)/1000));
                      }
                      public void onFinish() {
                          isRunning = false; timeLeft = 0;
                          tvTimer.setText("FINISH!");
                          btnStartPause.setText("START");
                          styleButton(btnStartPause, "#0EA5E9");
                          sendBroadcast(new Intent(MainActivity.this, AlarmReceiver.class));
                      }
                  }.start();
              }

              private void styleButton(Button b, String color) {
                  GradientDrawable gd = new GradientDrawable();
                  gd.setColor(Color.parseColor(color));
                  gd.setCornerRadius(25);
                  b.setBackground(gd);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0, 10, 0, 10);
                  b.setLayoutParams(lp);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_Modern_UI
          path: app/build/outputs/apk/debug/*.apk
          
