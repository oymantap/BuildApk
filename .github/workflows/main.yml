name: Build_Jam_Simpel_Rycl_PANTANG_MENYERAH

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          # 1. Bensin AndroidX
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. Ambil Ikon Buatan Rycl
          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
          fi

          # 3. Settings Paling Simpel
          echo "include ':app'" > settings.gradle

          # 4. SATU FILE UNTUK SEMUA (Mencegah Mutation Error)
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOT

          # 5. Build App Tanpa Blok Plugins (Gaya Klasik yang Paling Stabil)
          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.rycl.jam.fix.final.sekali"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          // Kosongkan dependencies di sini, kita pakai library standar saja
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOT

          # 6. Manifest & Theme
          echo "<resources><style name='AppTheme' parent='Theme.Material3.DayNight.NoActionBar'/></resources>" > app/src/main/res/values/themes.xml
          
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Jam Simpel" android:icon="@drawable/icon_app" android:theme="@style/AppTheme">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 7. Kode Java (Fitur Lengkap + Powered by Rycl)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import com.google.android.material.button.MaterialButton;
          import com.google.android.material.tabs.TabLayout;
          import android.media.Ringtone;
          import android.media.RingtoneManager;

          public class MainActivity extends Activity {
              private Ringtone ring;
              private CountDownTimer cdt;
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(1);
                  root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#F5F5F5"));

                  TabLayout tabs = new TabLayout(this);
                  tabs.addTab(tabs.newTab().setText("JAM"));
                  tabs.addTab(tabs.newTab().setText("TIMER"));
                  root.addView(tabs);

                  final FrameLayout container = new FrameLayout(this);
                  root.addView(container, new LinearLayout.LayoutParams(-1, 0, 1f));

                  // UI JAM
                  final TextClock clock = new TextClock(this);
                  clock.setTextSize(60);
                  clock.setGravity(Gravity.CENTER);
                  container.addView(clock);

                  // UI TIMER
                  final LinearLayout tL = new LinearLayout(this);
                  tL.setOrientation(1); tL.setGravity(Gravity.CENTER);
                  tL.setVisibility(View.GONE);
                  
                  final TextView tvDisp = new TextView(this);
                  tvDisp.setText("00:00:00"); tvDisp.setTextSize(50);
                  tL.addView(tvDisp);

                  LinearLayout ins = new LinearLayout(this);
                  ins.setGravity(Gravity.CENTER);
                  final EditText eH = new EditText(this); eH.setHint("H");
                  final EditText eM = new EditText(this); eM.setHint("M");
                  final EditText eS = new EditText(this); eS.setHint("S");
                  eH.setInputType(2); eM.setInputType(2); eS.setInputType(2);
                  ins.addView(eH); ins.addView(eM); ins.addView(eS);
                  tL.addView(ins);

                  final MaterialButton btn = new MaterialButton(this);
                  btn.setText("START");
                  tL.addView(btn);

                  final MaterialButton stopBtn = new MaterialButton(this);
                  stopBtn.setText("MATIKAN ALARM"); stopBtn.setVisibility(View.GONE);
                  stopBtn.setBackgroundColor(Color.RED);
                  tL.addView(stopBtn);
                  container.addView(tL);

                  // Watermark
                  TextView wm = new TextView(this);
                  wm.setText("Powered by Rycl"); wm.setTextSize(10);
                  wm.setTextColor(Color.LTGRAY); wm.setGravity(1);
                  root.addView(wm);

                  tabs.addOnTabSelectedListener(new TabLayout.OnTabSelectedListener() {
                      public void onTabSelected(TabLayout.Tab t) {
                          clock.setVisibility(t.getPosition()==0 ? 0 : 8);
                          tL.setVisibility(t.getPosition()==1 ? 0 : 8);
                      }
                      public void onTabUnselected(TabLayout.Tab t) {}
                      public void onTabReselected(TabLayout.Tab t) {}
                  });

                  btn.setOnClickListener(v -> {
                      long time = (gv(eH)*3600 + gv(eM)*60 + gv(eS)) * 1000;
                      if(time > 0) {
                          if(cdt != null) cdt.cancel();
                          cdt = new CountDownTimer(time, 1000) {
                              public void onTick(long l) {
                                  long h=l/3600000, m=(l%3600000)/60000, s=(l%60000)/1000;
                                  tvDisp.setText(String.format("%02d:%02d:%02d", h, m, s));
                              }
                              public void onFinish() {
                                  tvDisp.setText("HABIS!");
                                  ring = RingtoneManager.getRingtone(getApplicationContext(), RingtoneManager.getDefaultUri(4));
                                  if(ring != null) { ring.setLooping(true); ring.play(); }
                                  btn.setVisibility(8); stopBtn.setVisibility(0);
                              }
                          }.start();
                      }
                  });

                  stopBtn.setOnClickListener(v -> {
                      if(ring != null) ring.stop();
                      stopBtn.setVisibility(8); btn.setVisibility(0);
                      tvDisp.setText("00:00:00");
                  });

                  setContentView(root);
              }
              private long gv(EditText e) {
                  String s = e.getText().toString();
                  return s.isEmpty() ? 0 : Long.parseLong(s);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_FINAL_JUARA
          path: app/build/outputs/apk/debug/*.apk
          
