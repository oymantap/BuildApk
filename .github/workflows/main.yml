name: Build_Jam_Simpel_UCL_Edition

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable

          # 1. Properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. Settings (Pake block plugins modern)
          cat <<EOT > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOT

          # 3. Build Utama (Kosongin aja, pindah ke app)
          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle

          # 4. Build App (GAYA MODERN - ANTI MUTATION ERROR)
          cat <<EOT > app/build.gradle
          plugins {
              id 'com.android.application' version '8.2.2'
          }

          android {
              namespace 'com.rycl.jam'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rycl.jam.final.ucl"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOT

          # 5. Manifest (Pake Ikon Sistem dulu biar GAK ERROR RESOURCE lagi)
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="Jam Simpel" 
                  android:icon="@android:drawable/ic_lock_idle_alarm"
                  android:theme="@style/Theme.MaterialComponents.Light.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 6. Kode Java
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import com.google.android.material.button.MaterialButton;
          import android.media.RingtoneManager;

          public class MainActivity extends Activity {
              private CountDownTimer timer;
              private TextView timerDisplay;
              private EditText input;
              private MaterialButton startBtn;
              private boolean isRunning = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(60, 100, 60, 60);
                  root.setBackgroundColor(Color.WHITE);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50);
                  clock.setFormat24Hour("HH:mm:ss");
                  root.addView(clock);

                  input = new EditText(this);
                  input.setHint("Menit");
                  input.setInputType(android.text.InputType.TYPE_CLASS_NUMBER);
                  root.addView(input);

                  timerDisplay = new TextView(this);
                  timerDisplay.setTextSize(40);
                  timerDisplay.setText("00:00");
                  root.addView(timerDisplay);

                  startBtn = new MaterialButton(this);
                  startBtn.setText("START");
                  startBtn.setOnClickListener(v -> {
                      if (!isRunning && !input.getText().toString().isEmpty()) {
                          isRunning = true;
                          timer = new CountDownTimer(Long.parseLong(input.getText().toString()) * 60000, 1000) {
                              public void onTick(long ms) {
                                  long sec = ms / 1000;
                                  timerDisplay.setText(String.format("%02d:%02d", sec/60, sec%60));
                              }
                              public void onFinish() {
                                  timerDisplay.setText("FINISH!");
                                  RingtoneManager.getRingtone(getApplicationContext(), RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM)).play();
                              }
                          }.start();
                      }
                  });
                  root.addView(startBtn);
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Final_UCL
          path: app/build/outputs/apk/debug/*.apk
          
