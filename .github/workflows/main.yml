name: Build_Jam_Simpel_Rycl_Final_V2

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          # PEMBERSIHAN TOTAL: Hapus folder src lama biar gak duplikat
          rm -rf app/src
          
          mkdir -p app/src/main/java/com/rycl/jam
          
          # 1. Settings file
          cat <<EOT > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "JamSimpel"
          include ':app'
          EOT

          # 2. Build file Utama (Kosong)
          echo "" > build.gradle

          # 3. Build file App
          cat <<EOT > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.rycl.jam'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rycl.jam"
                  minSdk 24
                  targetSdk 34
                  versionCode 1212
                  versionName "12.12"
              }
          }
          EOT

          # 4. Manifest
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Jam Simpel" android:icon="@android:drawable/ic_menu_recent_history">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 5. Kode Java (Pastikan Package Benar)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextClock;
          import android.widget.LinearLayout;
          import android.view.Gravity;
          import android.graphics.Color;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout layout = new LinearLayout(this);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.BLACK);
                  TextClock jam = new TextClock(this);
                  jam.setFormat24Hour("HH:mm:ss");
                  jam.setTextSize(60);
                  jam.setTextColor(Color.GREEN);
                  layout.addView(jam);
                  setContentView(layout);
              }
          }
          EOT

      - name: Build with Gradle
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_V12_12
          path: app/build/outputs/apk/debug/*.apk
          
