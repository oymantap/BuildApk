name: Build_Jam_Simpel_Final_RYCL_FIX

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
            ICON_VAL="@drawable/icon_app"
          else
            ICON_VAL="@android:drawable/ic_lock_idle_alarm"
          fi

          echo "include ':app'" > settings.gradle

          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 34
              namespace 'com.rycl.jam'
              defaultConfig {
                  applicationId "com.rycl.jam.FINAL"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="Jam Simpel" 
                  android:icon="$ICON_VAL"
                  android:allowBackup="true"
                  android:theme="@style/Theme.MaterialComponents.Light.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import com.google.android.material.button.MaterialButton;
          import android.media.Ringtone;
          import android.media.RingtoneManager;
          import android.net.Uri;

          public class MainActivity extends Activity {
              private CountDownTimer timer;
              private TextView timerDisplay;
              private EditText input;
              private MaterialButton startBtn;
              private boolean isRunning = false;
              private Ringtone r;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(60, 100, 60, 60);
                  root.setBackgroundColor(Color.parseColor("#F5F5F5"));

                  TextView name = new TextView(this);
                  name.setText("RYCL JAM");
                  name.setTextColor(Color.parseColor("#6200EE"));
                  name.setTextSize(20);
                  name.setPadding(0, 0, 0, 50);
                  root.addView(name);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(60);
                  clock.setTextColor(Color.BLACK);
                  clock.setFormat24Hour("HH:mm:ss");
                  root.addView(clock);

                  input = new EditText(this);
                  input.setHint("Set Menit");
                  input.setTextColor(Color.BLACK);
                  input.setInputType(android.text.InputType.TYPE_CLASS_NUMBER);
                  input.setGravity(Gravity.CENTER);
                  root.addView(input);

                  timerDisplay = new TextView(this);
                  timerDisplay.setText("00:00");
                  timerDisplay.setTextSize(40);
                  timerDisplay.setTextColor(Color.RED);
                  root.addView(timerDisplay);

                  startBtn = new MaterialButton(this);
                  startBtn.setText("MULAI TIMER");
                  startBtn.setBackgroundColor(Color.parseColor("#6200EE"));
                  startBtn.setTextColor(Color.WHITE);
                  
                  startBtn.setOnClickListener(v -> {
                      if (!isRunning) {
                          String val = input.getText().toString();
                          if (!val.isEmpty()) {
                              long millis = Long.parseLong(val) * 60000;
                              if (timer != null) timer.cancel();
                              timer = new CountDownTimer(millis, 1000) {
                                  public void onTick(long ms) {
                                      long sec = ms / 1000;
                                      timerDisplay.setText(String.format("%02d:%02d", sec/60, sec%60));
                                  }
                                  public void onFinish() {
                                      timerDisplay.setText("WAKTU HABIS!");
                                      Uri n = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                                      r = RingtoneManager.getRingtone(getApplicationContext(), n);
                                      if (r != null) r.play();
                                  }
                              }.start();
                              startBtn.setText("STOP");
                              startBtn.setBackgroundColor(Color.RED);
                              isRunning = true;
                          }
                      } else {
                          if (timer != null) timer.cancel();
                          if (r != null && r.isPlaying()) r.stop();
                          timerDisplay.setText("00:00");
                          startBtn.setText("MULAI TIMER");
                          startBtn.setBackgroundColor(Color.parseColor("#6200EE"));
                          isRunning = false;
                      }
                  });
                  root.addView(startBtn);
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_Pasti_Muncul
          path: app/build/outputs/apk/debug/*.apk
          
