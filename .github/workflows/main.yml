name: Build_Jam_Simpel_Final_RYCL_UCL_FIX

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable

          # 1. Properties (Bensin AndroidX)
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. Settings (Pusat Kendali Gudang - Biar Gak Mutasi Error)
          cat <<EOT > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOT

          # 3. Build Root (Hanya Plugin)
          cat <<EOT > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOT

          # 4. Build App (Sangat Bersih)
          cat <<EOT > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.rycl.jam'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rycl.jam.app.final"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOT

          # 5. Manifest (Ikon standar biar gak rewel resource)
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="Jam Rycl" 
                  android:icon="@android:drawable/ic_lock_idle_alarm"
                  android:theme="@style/Theme.MaterialComponents.Light.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 6. Kode Java (Fitur Timer + Alarm)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import com.google.android.material.button.MaterialButton;
          import android.media.RingtoneManager;

          public class MainActivity extends Activity {
              private CountDownTimer timer;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(50, 50, 50, 50);
                  root.setBackgroundColor(Color.WHITE);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50);
                  root.addView(clock);

                  EditText input = new EditText(this);
                  input.setHint("Menit");
                  input.setInputType(android.text.InputType.TYPE_CLASS_NUMBER);
                  root.addView(input);

                  TextView tv = new TextView(this);
                  tv.setTextSize(30);
                  tv.setText("00:00");
                  root.addView(tv);

                  MaterialButton btn = new MaterialButton(this);
                  btn.setText("START TIMER");
                  btn.setOnClickListener(v -> {
                      String s = input.getText().toString();
                      if(!s.isEmpty()){
                          if(timer != null) timer.cancel();
                          timer = new CountDownTimer(Long.parseLong(s) * 60000, 1000) {
                              public void onTick(long ms) {
                                  long sec = ms / 1000;
                                  tv.setText(String.format("%02d:%02d", sec/60, sec%60));
                              }
                              public void onFinish() {
                                  tv.setText("WAKTU HABIS!");
                                  RingtoneManager.getRingtone(getApplicationContext(), 
                                      RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM)).play();
                              }
                          }.start();
                      }
                  });
                  root.addView(btn);
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Final_Fixed
          path: app/build/outputs/apk/debug/*.apk
          
