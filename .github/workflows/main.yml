name: Build_Jam_Rycl_Pro_Fix

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app/src
          mkdir -p app/src/main/java/com/rycl/jam
          
          # 1. SETTINGS DENGAN PAKSA GUDANG GOOGLE
          cat <<EOT > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "JamSimpel"
          include ':app'
          EOT

          # 2. BUILD FILE (KOSONGKAN UTAMA)
          echo "" > build.gradle

          # 3. BUILD FILE APP (PAKAI VERSI STABIL)
          cat <<EOT > app/build.gradle
          plugins {
              id 'com.android.application' version '8.2.2'
          }
          android {
              namespace 'com.rycl.jam'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rycl.jam"
                  minSdk 24
                  targetSdk 34
                  versionCode 1213
                  versionName "12.13"
              }
          }
          EOT

          # 4. MANIFEST (JAM RYCL PRO)
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Jam Rycl Pro" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 5. KODE JAVA MODERN (JAM + TIMER + NAMA RYCL)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.SystemClock;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import android.graphics.Color;
          import android.graphics.Typeface;

          public class MainActivity extends Activity {
              private boolean isRunning = false;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#121212"));
                  root.setPadding(50, 50, 50, 50);

                  TextView brand = new TextView(this);
                  brand.setText("RYCL EXCLUSIVE EDITION");
                  brand.setTextColor(Color.GRAY);
                  brand.setTextSize(14);
                  brand.setLetterSpacing(0.2f);
                  root.addView(brand);

                  TextClock clock = new TextClock(this);
                  clock.setFormat24Hour("HH:mm");
                  clock.setTextSize(80);
                  clock.setTextColor(Color.WHITE);
                  clock.setTypeface(null, Typeface.BOLD);
                  root.addView(clock);

                  TextView owner = new TextView(this);
                  owner.setText("Created by Rycl");
                  owner.setTextColor(Color.parseColor("#00FFAB"));
                  owner.setPadding(0, 0, 0, 80);
                  root.addView(owner);

                  final Chronometer timer = new Chronometer(this);
                  timer.setTextSize(40);
                  timer.setTextColor(Color.WHITE);
                  timer.setPadding(0, 50, 0, 30);
                  root.addView(timer);

                  Button btn = new Button(this);
                  btn.setText("START / STOP");
                  btn.setBackgroundColor(Color.parseColor("#00FFAB"));
                  btn.setTextColor(Color.BLACK);
                  btn.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          if (!isRunning) {
                              timer.setBase(SystemClock.elapsedRealtime());
                              timer.start();
                              isRunning = true;
                          } else {
                              timer.stop();
                              isRunning = false;
                          }
                      }
                  });
                  root.addView(btn);
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Rycl_Pro_V12_13_FIX
          path: app/build/outputs/apk/debug/*.apk
          
