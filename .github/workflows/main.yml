name: Build_Jam_Simpel_RYCL_STOP_ERROR

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          # Bersihkan total
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/layout
          
          # 1. Settings Paling Dasar
          echo "include ':app'" > settings.gradle

          # 2. Build Root Minimalis
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          # 3. Build App Tanpa Library Luar (ANTI-MUTATION)
          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.rycl.jam.fix.final"
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          # Dependencies dikosongkan biar gak error mutation lagi
          dependencies {}
          EOT

          # 4. Manifest (Ikon Sistem & Theme Standar)
          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="Jam Rycl" 
                  android:icon="@android:drawable/ic_lock_idle_alarm"
                  android:theme="@android:style/Theme.DeviceDefault">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT

          # 5. Kode Java (Fitur Timer + Alarm - Gak pake library luar)
          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.media.RingtoneManager;

          public class MainActivity extends Activity {
              private CountDownTimer timer;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.BLACK);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50);
                  clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  final EditText input = new EditText(this);
                  input.setHint("Menit");
                  input.setHintTextColor(Color.GRAY);
                  input.setTextColor(Color.WHITE);
                  input.setInputType(2); // TYPE_CLASS_NUMBER
                  root.addView(input);

                  final TextView tv = new TextView(this);
                  tv.setTextSize(40);
                  tv.setTextColor(Color.YELLOW);
                  tv.setText("00:00");
                  root.addView(tv);

                  Button btn = new Button(this);
                  btn.setText("MULAI TIMER");
                  btn.setOnClickListener(new View.OnClickListener() {
                      public void onClick(View v) {
                          String s = input.getText().toString();
                          if(!s.isEmpty()){
                              if(timer != null) timer.cancel();
                              timer = new CountDownTimer(Long.parseLong(s) * 60000, 1000) {
                                  public void onTick(long ms) {
                                      long sec = ms / 1000;
                                      tv.setText(String.format("%02d:%02d", sec/60, sec%60));
                                  }
                                  public void onFinish() {
                                      tv.setText("HABIS!");
                                      RingtoneManager.getRingtone(getApplicationContext(), 
                                          RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM)).play();
                                  }
                              }.start();
                          }
                      }
                  });
                  root.addView(btn);
                  setContentView(root);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Rycl_Sukses
          path: app/build/outputs/apk/debug/*.apk
          
