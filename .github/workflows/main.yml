name: Build_APK_Rycl_Fix

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure and Build
        run: |
          # 1. Buat folder dulu
          mkdir -p app/src/main/java/com/rycl/app
          
          # 2. File Settings yang simpel
          echo "rootProject.name = 'RyclApp'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          # 3. Build file versi modern (Tanpa buildscript ribet)
          cat <<EOT > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.rycl.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rycl.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOT

          # 4. Manifest minimalis
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rycl.app"><application/></manifest>' > app/src/main/AndroidManifest.xml

          # 5. Eksekusi build (Langsung pakai perintah gradle bawaan runner)
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK_RYCL_JADI
          path: app/build/outputs/apk/debug/*.apk
          
