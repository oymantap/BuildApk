name: Build_Jam_Rycl_With_Stop_Button

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable
          [ -f "icon_app.png" ] && cp icon_app.png app/src/main/res/drawable/icon_app.png
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig { applicationId "com.rycl.jam.v3.final"; minSdk 24; targetSdk 34; versionCode 1211; versionName "12.11" }
          }
          dependencies {
              implementation 'androidx.core:core:1.12.0'
          }
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application android:label="Jam Simpel" android:icon="@drawable/icon_app" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  <receiver android:name="com.rycl.jam.AlarmReceiver" android:exported="false" />
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/AlarmReceiver.java
          package com.rycl.jam;
          import android.content.*;
          import android.media.*;
          import android.net.Uri;
          import android.app.*;
          import androidx.core.app.NotificationCompat;

          public class AlarmReceiver extends BroadcastReceiver {
              private static Ringtone ringtone;
              @Override
              public void onReceive(Context context, Intent intent) {
                  String action = intent.getAction();
                  if ("STOP_ALARM".equals(action)) {
                      if (ringtone != null) ringtone.stop();
                      NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                      nm.cancel(101);
                      return;
                  }

                  Uri uri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  if (ringtone == null) ringtone = RingtoneManager.getRingtone(context, uri);
                  ringtone.play();

                  NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (android.os.Build.VERSION.SDK_INT >= 26) {
                      nm.createNotificationChannel(new NotificationChannel("RYCL", "Alarm", NotificationManager.IMPORTANCE_HIGH));
                  }

                  Intent stopIntent = new Intent(context, AlarmReceiver.class);
                  stopIntent.setAction("STOP_ALARM");
                  PendingIntent stopPI = PendingIntent.getBroadcast(context, 0, stopIntent, PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);

                  Notification notif = new NotificationCompat.Builder(context, "RYCL")
                      .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                      .setContentTitle("ALARM RYCL")
                      .setContentText("Waktu Habis! Klik stop untuk mematikan.")
                      .setPriority(NotificationCompat.PRIORITY_MAX)
                      .setCategory(NotificationCompat.CATEGORY_ALARM)
                      .addAction(android.R.drawable.ic_menu_close_clear_cancel, "MATIKAN ALARM", stopPI)
                      .setOngoing(true)
                      .build();
                  nm.notify(101, notif);
              }
          }
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.*;
          import android.content.*;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import java.util.Calendar;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(1); root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#121212"));

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(50); clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  final EditText inT = new EditText(this); inT.setHint("Timer (Menit)"); inT.setTextColor(Color.WHITE); inT.setInputType(2);
                  root.addView(inT);
                  Button bT = new Button(this); bT.setText("START TIMER"); root.addView(bT);

                  final EditText inH = new EditText(this); inH.setHint("Jam (0-23)"); inH.setTextColor(Color.WHITE); inH.setInputType(2);
                  final EditText inM = new EditText(this); inM.setHint("Menit"); inM.setTextColor(Color.WHITE); inM.setInputType(2);
                  root.addView(inH); root.addView(inM);
                  Button bA = new Button(this); bA.setText("SET ALARM"); root.addView(bA);

                  TextView wm = new TextView(this); wm.setText("\nPowered by Rycl"); wm.setTextColor(Color.DKGRAY); wm.setGravity(1); root.addView(wm);

                  bT.setOnClickListener(v -> {
                      if(!inT.getText().toString().isEmpty()) setA(Long.parseLong(inT.getText().toString()) * 60000);
                  });

                  bA.setOnClickListener(v -> {
                      if(!inH.getText().toString().isEmpty() && !inM.getText().toString().isEmpty()){
                          Calendar c = Calendar.getInstance();
                          c.set(Calendar.HOUR_OF_DAY, Integer.parseInt(inH.getText().toString()));
                          c.set(Calendar.MINUTE, Integer.parseInt(inM.getText().toString()));
                          c.set(Calendar.SECOND, 0);
                          long d = c.getTimeInMillis() - System.currentTimeMillis();
                          if(d < 0) d += 24 * 3600000;
                          setA(d);
                      }
                  });
                  setContentView(root);
              }

              private void setA(long ms) {
                  AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                  Intent i = new Intent(this, AlarmReceiver.class);
                  PendingIntent pi = PendingIntent.getBroadcast(this, 1, i, PendingIntent.FLAG_IMMUTABLE | PendingIntent.FLAG_UPDATE_CURRENT);
                  if (Build.VERSION.SDK_INT >= 31) am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + ms, pi);
                  else am.setExact(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + ms, pi);
                  Toast.makeText(this, "Alarm Disetel!", 0).show();
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Simpel_Final_With_Stop
          path: app/build/outputs/apk/debug/*.apk
          
