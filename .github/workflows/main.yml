name: Build_APK_Rycl_Final_Boss

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project structure
        run: |
          mkdir -p app/src/main/java/com/rycl/app
          
          # 1. Settings file (Paling penting buat kasih tahu lokasi plugin)
          cat <<EOT > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "RyclApp"
          include ':app'
          EOT

          # 2. Build file Utama (Cuma buat deklarasi versi plugin)
          cat <<EOT > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'com.android.library' version '8.2.2' apply false
          }
          EOT

          # 3. Build file App (Baru panggil pluginnya tanpa versi)
          cat <<EOT > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.rycl.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rycl.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOT

          # 4. Manifest
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rycl.app"><application/></manifest>' > app/src/main/AndroidManifest.xml

      - name: Build with Gradle
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK_RYCL_BERHASIL
          path: app/build/outputs/apk/debug/*.apk
          
