name: Build_Jam_Rycl_Ultra_Final_Pro

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable
          
          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
          fi

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig { 
                  applicationId "com.rycl.jam.vfinal"
                  minSdk 24
                  targetSdk 34
                  versionCode 1211
                  versionName "12.11"
              }
          }
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application 
                  android:label="Jam But" 
                  android:icon="@drawable/icon_app" 
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:name="com.rycl.jam.AlarmReceiver" android:exported="false" />
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/AlarmReceiver.java
          package com.rycl.jam;
          import android.content.*;
          import android.media.*;
          import android.net.Uri;
          import android.os.PowerManager;

          public class AlarmReceiver extends BroadcastReceiver {
              public static Ringtone r;
              @Override
              public void onReceive(Context context, Intent intent) {
                  PowerManager pm = (PowerManager) context.getSystemService(Context.POWER_SERVICE);
                  PowerManager.WakeLock wl = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "RyclJam:WakeLock");
                  wl.acquire(10000);

                  Uri uri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  if (r == null) r = RingtoneManager.getRingtone(context, uri);
                  if (r != null) r.play();
              }
          }
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.*;
          import android.content.*;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import java.util.Calendar;

          public class MainActivity extends Activity {
              private TextView tvTimer;
              private EditText inTH, inTM, inTS, inAH, inAM;
              private CountDownTimer cdt;
              private boolean timerRunning = false;
              private long timerMs = 0;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  stopSound();

                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setBackgroundColor(Color.parseColor("#0F172A"));
                  root.setPadding(40, 60, 40, 60);
                  scroll.addView(root);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(30); clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  // TIMER SECTION
                  addLabel(root, "TIMER (Jam : Min : Det)");
                  LinearLayout rowT = new LinearLayout(this);
                  rowT.setGravity(Gravity.CENTER);
                  inTH = addInput(rowT, "H"); inTM = addInput(rowT, "M"); inTS = addInput(rowT, "S");
                  root.addView(rowT);

                  tvTimer = new TextView(this);
                  tvTimer.setText("00:00:00"); tvTimer.setTextSize(50);
                  tvTimer.setTextColor(Color.CYAN); tvTimer.setGravity(Gravity.CENTER);
                  root.addView(tvTimer);

                  Button bT = new Button(this); bT.setText("START TIMER"); styleBtn(bT, "#0EA5E9");
                  root.addView(bT);

                  // ALARM SECTION
                  addLabel(root, "\nALARM (Jam : Menit)");
                  LinearLayout rowA = new LinearLayout(this);
                  rowA.setGravity(Gravity.CENTER);
                  inAH = addInput(rowA, "Jam"); inAM = addInput(rowA, "Min");
                  root.addView(rowA);

                  Button bA = new Button(this); bA.setText("SET ALARM"); styleBtn(bA, "#8B5CF6");
                  root.addView(bA);

                  // STOP SECTION
                  View v = new View(this); root.addView(v, new LinearLayout.LayoutParams(1, 50));
                  Button bStop = new Button(this); bStop.setText("MATIKAN SUARA"); styleBtn(bStop, "#EF4444");
                  root.addView(bStop);

                  bT.setOnClickListener(v1 -> {
                      if(!timerRunning) {
                          long h = getVal(inTH)*3600000; long m = getVal(inTM)*60000; long s = getVal(inTS)*1000;
                          long total = h + m + s;
                          if(total > 0) startT(total);
                      }
                  });

                  bA.setOnClickListener(v1 -> {
                      Calendar c = Calendar.getInstance();
                      c.set(Calendar.HOUR_OF_DAY, (int)getVal(inAH));
                      c.set(Calendar.MINUTE, (int)getVal(inAM));
                      c.set(Calendar.SECOND, 0);
                      long diff = c.getTimeInMillis() - System.currentTimeMillis();
                      if(diff < 0) diff += 24*3600000;
                      setSysAlarm(diff);
                  });

                  bStop.setOnClickListener(v1 -> stopSound());

                  setContentView(scroll);
              }

              @Override
              protected void onResume() { super.onResume(); stopSound(); }

              private void stopSound() { if(AlarmReceiver.r != null) AlarmReceiver.r.stop(); }

              private long getVal(EditText e) {
                  String s = e.getText().toString();
                  return s.isEmpty() ? 0 : Long.parseLong(s);
              }

              private void startT(long ms) {
                  timerRunning = true;
                  cdt = new CountDownTimer(ms, 1000) {
                      public void onTick(long l) {
                          int h=(int)(l/3600000); int m=(int)((l%3600000)/60000); int s=(int)((l%60000)/1000);
                          tvTimer.setText(String.format("%02d:%02d:%02d", h, m, s));
                      }
                      public void onFinish() {
                          timerRunning = false; tvTimer.setText("SELESAI!");
                          sendBroadcast(new Intent(MainActivity.this, AlarmReceiver.class));
                      }
                  }.start();
              }

              private void setSysAlarm(long delay) {
                  AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE);
                  Intent i = new Intent(this, AlarmReceiver.class);
                  PendingIntent pi = PendingIntent.getBroadcast(this, (int)System.currentTimeMillis(), i, PendingIntent.FLAG_IMMUTABLE);
                  am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + delay, pi);
                  Toast.makeText(this, "Alarm dipasang!", 0).show();
              }

              private void addLabel(LinearLayout l, String t) {
                  TextView tv = new TextView(this); tv.setText(t); tv.setTextColor(Color.GRAY);
                  l.addView(tv);
              }

              private EditText addInput(LinearLayout l, String hint) {
                  EditText e = new EditText(this); e.setHint(hint); e.setHintTextColor(Color.DKGRAY);
                  e.setTextColor(Color.WHITE); e.setInputType(2); e.setGravity(Gravity.CENTER);
                  GradientDrawable gd = new GradientDrawable(); gd.setColor(Color.parseColor("#1E293B")); gd.setCornerRadius(10);
                  e.setBackground(gd); 
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(180, 120); lp.setMargins(10, 10, 10, 10);
                  l.addView(e, lp); return e;
              }

              private void styleBtn(Button b, String c) {
                  GradientDrawable gd = new GradientDrawable(); gd.setColor(Color.parseColor(c)); gd.setCornerRadius(20);
                  b.setBackground(gd); b.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, 130); lp.setMargins(0, 20, 0, 10);
                  b.setLayoutParams(lp);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Rycl_Ultra_Final
          path: app/build/outputs/apk/debug/*.apk
          
