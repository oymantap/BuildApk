name: Build_Jam_Rycl_Icon_Fixed

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          # Bersihkan sisa build lama
          rm -rf app settings.gradle build.gradle gradle.properties
          
          # Buat folder yang dibutuhkan
          mkdir -p app/src/main/java/com/rycl/jam
          mkdir -p app/src/main/res/drawable
          
          # COPY ICON DARI ROOT KE PROJECT (Penting!)
          if [ -f "icon_app.png" ]; then
            cp icon_app.png app/src/main/res/drawable/icon_app.png
            echo "Ikon ditemukan dan disalin."
          else
            echo "Peringatan: icon_app.png tidak ditemukan di root!"
          fi

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          
          cat <<EOT > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOT

          cat <<EOT > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rycl.jam'
              compileSdkVersion 34
              defaultConfig { 
                  applicationId "com.rycl.jam.modern.final"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOT

          cat <<EOT > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <application 
                  android:label="Jam Rycl" 
                  android:icon="@drawable/icon_app" 
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.rycl.jam.MainActivity" android:exported="true" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:name="com.rycl.jam.AlarmReceiver" android:exported="false" />
              </application>
          </manifest>
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/AlarmReceiver.java
          package com.rycl.jam;
          import android.content.*;
          import android.media.*;
          import android.net.Uri;
          import android.widget.Toast;

          public class AlarmReceiver extends BroadcastReceiver {
              public static Ringtone r;
              @Override
              public void onReceive(Context context, Intent intent) {
                  Toast.makeText(context, "ALARM BUNYI!", Toast.LENGTH_LONG).show();
                  Uri uri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  if (r == null) r = RingtoneManager.getRingtone(context, uri);
                  r.play();
              }
          }
          EOT

          cat <<EOT > app/src/main/java/com/rycl/jam/MainActivity.java
          package com.rycl.jam;
          import android.app.*;
          import android.content.*;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;

          public class MainActivity extends Activity {
              private long timeLeft = 0;
              private boolean isRunning = false;
              private CountDownTimer timer;
              private TextView tvTimer;
              private EditText inT;
              private Button btnStartPause;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  if(AlarmReceiver.r != null) AlarmReceiver.r.stop();

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setBackgroundColor(Color.parseColor("#0F172A"));
                  root.setPadding(60, 60, 60, 60);

                  TextClock clock = new TextClock(this);
                  clock.setTextSize(35); clock.setTextColor(Color.WHITE);
                  root.addView(clock);

                  tvTimer = new TextView(this);
                  tvTimer.setText("00:00"); tvTimer.setTextSize(90); tvTimer.setTextColor(Color.parseColor("#38BDF8"));
                  tvTimer.setPadding(0, 50, 0, 50);
                  root.addView(tvTimer);

                  inT = new EditText(this);
                  inT.setHint("Menit"); inT.setHintTextColor(Color.GRAY);
                  inT.setTextColor(Color.WHITE); inT.setInputType(2);
                  inT.setGravity(Gravity.CENTER);
                  
                  GradientDrawable gdInput = new GradientDrawable();
                  gdInput.setColor(Color.parseColor("#1E293B"));
                  gdInput.setCornerRadius(20);
                  inT.setBackground(gdInput);
                  inT.setPadding(20, 30, 20, 30);
                  
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0, 20, 0, 40);
                  root.addView(inT, lp);

                  btnStartPause = new Button(this);
                  btnStartPause.setText("START");
                  btnStartPause.setTextColor(Color.WHITE);
                  styleButton(btnStartPause, "#0EA5E9");
                  root.addView(btnStartPause);

                  View s = new View(this);
                  root.addView(s, new LinearLayout.LayoutParams(1, 30));

                  Button btnReset = new Button(this);
                  btnReset.setText("MULAI BARU");
                  btnReset.setTextColor(Color.WHITE);
                  styleButton(btnReset, "#EF4444");
                  root.addView(btnReset);

                  TextView wm = new TextView(this);
                  wm.setText("\nPowered by Rycl");
                  wm.setTextColor(Color.parseColor("#475569"));
                  wm.setGravity(Gravity.CENTER);
                  root.addView(wm);

                  btnStartPause.setOnClickListener(v -> {
                      if (!isRunning) {
                          long ms = (timeLeft > 0) ? timeLeft : (inT.getText().toString().isEmpty() ? 0 : Long.parseLong(inT.getText().toString()) * 60000);
                          if (ms > 0) {
                              startTimer(ms);
                              btnStartPause.setText("PAUSE");
                              styleButton(btnStartPause, "#F59E0B");
                          }
                      } else {
                          timer.cancel();
                          isRunning = false;
                          btnStartPause.setText("RESUME");
                          styleButton(btnStartPause, "#10B981");
                      }
                  });

                  btnReset.setOnClickListener(v -> {
                      if (timer != null) timer.cancel();
                      if (AlarmReceiver.r != null) AlarmReceiver.r.stop();
                      isRunning = false; timeLeft = 0;
                      tvTimer.setText("00:00"); inT.setText("");
                      btnStartPause.setText("START");
                      styleButton(btnStartPause, "#0EA5E9");
                  });

                  setContentView(root);
              }

              private void startTimer(long ms) {
                  isRunning = true;
                  timer = new CountDownTimer(ms, 1000) {
                      public void onTick(long l) {
                          timeLeft = l;
                          tvTimer.setText(String.format("%02d:%02d", (int)(l/60000), (int)(l%60000)/1000));
                      }
                      public void onFinish() {
                          isRunning = false; timeLeft = 0;
                          tvTimer.setText("DONE!");
                          btnStartPause.setText("START");
                          styleButton(btnStartPause, "#0EA5E9");
                          sendBroadcast(new Intent(MainActivity.this, AlarmReceiver.class));
                      }
                  }.start();
              }

              private void styleButton(Button b, String color) {
                  GradientDrawable gd = new GradientDrawable();
                  gd.setColor(Color.parseColor(color));
                  gd.setCornerRadius(30);
                  b.setBackground(gd);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, 140);
                  lp.setMargins(0, 10, 0, 10);
                  b.setLayoutParams(lp);
              }
          }
          EOT

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Jam_Rycl_Final_FullStyle
          path: app/build/outputs/apk/debug/*.apk
          
